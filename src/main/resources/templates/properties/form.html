<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle} + ' – Rentify'">Property Form – Rentify</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }
        header {
            background: #2c3e50;
            color: #fff;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 1.6rem; letter-spacing: 1px; }
        .container { max-width: 700px; margin: 32px auto; padding: 0 16px; }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            padding: 32px;
        }
        .card h2 { font-size: 1.3rem; color: #2c3e50; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .9rem; color: #555; }
        input[type="text"],
        input[type="number"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: .95rem;
            transition: border-color .2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,.15);
        }
        textarea { resize: vertical; min-height: 90px; }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: .95rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; color: #fff; margin-left: 10px; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { margin-top: 24px; }
    </style>
</head>
<body>
<header>
    <h1>🏠 Rentify</h1>
    <a style="color:#fff;text-decoration:none;" th:href="@{/properties}">← Back to list</a>
</header>

<div class="container">
    <div class="card">
        <h2 th:text="${formTitle}">Property Form</h2>

        <form th:action="${actionUrl}" th:object="${property}" method="post">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" th:field="*{title}" placeholder="e.g. Modern Apartment Downtown" required/>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" placeholder="Describe the property..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" th:field="*{city}" placeholder="e.g. Paris" required/>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" th:field="*{address}" placeholder="e.g. 12 Rue de Rivoli"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price ($/month) *</label>
                    <input type="number" id="price" th:field="*{price}" placeholder="1200" min="0" step="0.01" required/>
                </div>
                <div class="form-group">
                    <label for="bedrooms">Bedrooms</label>
                    <input type="number" id="bedrooms" th:field="*{bedrooms}" placeholder="2" min="0"/>
                </div>
            </div>

            <div class="form-group">
                <label for="type">Type *</label>
                <select id="type" th:field="*{type}" required>
                    <option value="">-- Select type --</option>
                    <option value="Apartment">Apartment</option>
                    <option value="House">House</option>
                    <option value="Studio">Studio</option>
                    <option value="Villa">Villa</option>
                    <option value="Office">Office</option>
                    <option value="Land">Land</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="url" id="imageUrl" th:field="*{imageUrl}" placeholder="https://example.com/image.jpg"/>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">💾 Save</button>
                <a class="btn btn-secondary" th:href="@{/properties}">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
