<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Add Review – ' + ${property.title} + ' – Rentify'">Add Review – Rentify</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }
        header {
            background: #2c3e50;
            color: #fff;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 1.6rem; letter-spacing: 1px; }
        .container { max-width: 520px; margin: 40px auto; padding: 0 16px; }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            padding: 32px;
        }
        .card h2 { font-size: 1.4rem; color: #2c3e50; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group textarea,
        .form-group input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn {
            display: inline-block;
            padding: 10px 22px;
            border-radius: 4px;
            text-decoration: none;
            font-size: .9rem;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: #2980b9; color: #fff; }
        .btn-primary:hover { background: #2471a3; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
    </style>
</head>
<body>
<header>
    <h1>🏠 Rentify</h1>
    <a style="color:#fff;text-decoration:none;" th:href="@{/properties/{id}(id=${property.id})}">← Back to property</a>
</header>

<div class="container">
    <div class="card">
        <h2>⭐ Add a Review for <span th:text="${property.title}">Property</span></h2>

        <form th:action="@{/properties/{id}/reviews/save(id=${property.id})}" th:object="${review}" method="post">
            <div class="form-group">
                <label for="rating">Rating (1–5)</label>
                <input type="number" id="rating" th:field="*{rating}" min="1" max="5" required/>
            </div>
            <div class="form-group">
                <label for="comment">Comment</label>
                <textarea id="comment" th:field="*{comment}" placeholder="Share your experience..." required></textarea>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-primary">Submit Review</button>
                <a class="btn btn-secondary" th:href="@{/properties/{id}(id=${property.id})}">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
