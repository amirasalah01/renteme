<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${property.title} + ' – Rentify'">Property Details – Rentify</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; }
        header {
            background: #2c3e50;
            color: #fff;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 1.6rem; letter-spacing: 1px; }
        .container { max-width: 820px; margin: 32px auto; padding: 0 16px; }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            display: block;
        }
        .card-image .no-image {
            background: #ecf0f1;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 1.1rem;
        }
        .card-body { padding: 28px 32px; }
        .card-body h2 { font-size: 1.7rem; color: #2c3e50; margin-bottom: 6px; }
        .meta { color: #888; font-size: .9rem; margin-bottom: 20px; }
        .price { font-size: 1.5rem; font-weight: 700; color: #27ae60; margin-bottom: 20px; }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }
        .detail-item label {
            display: block;
            font-size: .78rem;
            text-transform: uppercase;
            color: #999;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .detail-item span { font-size: 1rem; color: #333; }
        .description-section { margin-bottom: 24px; }
        .description-section h3 { font-size: 1rem; color: #555; margin-bottom: 8px; }
        .description-section p { line-height: 1.7; color: #555; }
        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 12px;
            font-size: .82rem;
            font-weight: 600;
            background: #eaf4fb;
            color: #2980b9;
        }
        .btn {
            display: inline-block;
            padding: 9px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-size: .9rem;
            cursor: pointer;
            border: none;
        }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #d68910; }
        .btn-danger { background: #e74c3c; color: #fff; margin-left: 8px; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; color: #fff; margin-right: 8px; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #1e8449; }
        .actions { border-top: 1px solid #eee; padding-top: 20px; }
        .reviews-section { margin-top: 32px; border-top: 1px solid #eee; padding-top: 24px; }
        .reviews-section h3 { font-size: 1.1rem; color: #2c3e50; margin-bottom: 16px; }
        .review-item {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px 18px;
            margin-bottom: 12px;
        }
        .review-rating { font-weight: 700; color: #f39c12; margin-bottom: 4px; }
        .review-comment { color: #555; line-height: 1.6; }
        .no-reviews { color: #aaa; font-style: italic; }
    </style>
</head>
<body>
<header>
    <h1>🏠 Rentify</h1>
    <a style="color:#fff;text-decoration:none;" th:href="@{/properties}">← Back to list</a>
</header>

<div class="container">
    <div class="card">

        <!-- Property image -->
        <div class="card-image">
            <img th:if="${property.imageUrl != null and !#strings.isEmpty(property.imageUrl)}"
                 th:src="${property.imageUrl}"
                 th:alt="${property.title}"/>
            <div th:unless="${property.imageUrl != null and !#strings.isEmpty(property.imageUrl)}"
                 class="no-image">
                🖼️ No image available
            </div>
        </div>

        <div class="card-body">
            <h2 th:text="${property.title}">Property Title</h2>
            <p class="meta">
                Added on
                <span th:text="${#dates.format(property.createdAt, 'dd MMM yyyy')}"></span>
            </p>

            <p class="price" th:text="${'$' + #numbers.formatDecimal(property.price, 1, 2) + ' / month'}"></p>

            <div class="detail-grid">
                <div class="detail-item">
                    <label>City</label>
                    <span th:text="${property.city}">-</span>
                </div>
                <div class="detail-item">
                    <label>Address</label>
                    <span th:text="${property.address != null and !#strings.isEmpty(property.address) ? property.address : '—'}">-</span>
                </div>
                <div class="detail-item">
                    <label>Type</label>
                    <span class="badge" th:text="${property.type}">-</span>
                </div>
                <div class="detail-item">
                    <label>Bedrooms</label>
                    <span th:text="${property.bedrooms != null ? property.bedrooms : '—'}">-</span>
                </div>
            </div>

            <div class="description-section" th:if="${property.description != null and !#strings.isEmpty(property.description)}">
                <h3>Description</h3>
                <p th:text="${property.description}"></p>
            </div>

            <div class="actions">
                <a class="btn btn-secondary" th:href="@{/properties}">← Back</a>
                <a class="btn btn-warning" th:href="@{/properties/edit/{id}(id=${property.id})}">✏️ Edit</a>
                <a class="btn btn-danger"
                   th:href="@{/properties/delete/{id}(id=${property.id})}"
                   onclick="return confirm('Delete this property?')">🗑️ Delete</a>
                <a class="btn btn-success" th:href="@{/properties/{id}/reviews/new(id=${property.id})}">⭐ Add Review</a>
            </div>

            <!-- Reviews section -->
            <div class="reviews-section">
                <h3>Reviews</h3>
                <div th:if="${reviews != null and !reviews.isEmpty()}">
                    <div class="review-item" th:each="review : ${reviews}">
                        <div class="review-rating" th:text="'Rating: ' + ${review.rating} + ' / 5'">Rating</div>
                        <div class="review-comment" th:text="${review.comment}">Comment</div>
                    </div>
                </div>
                <p class="no-reviews" th:if="${reviews == null or reviews.isEmpty()}">No reviews yet. Be the first to review!</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
